name = "classifying-bundles"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["ClassifyingBundles"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
autoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.29.0"

[[lean_lib]]
name = "ClassifyingBundles"
